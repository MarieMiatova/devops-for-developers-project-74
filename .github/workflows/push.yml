name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3.12.0  

      - name: Setup Node.js
        uses: actions/setup-node@v3.18.0
        with:
          node-version: '20'  
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v3.5.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run CI (tests + migrations)
        run: |
          docker-compose run --rm app make test