version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app        
    command: make dev        
    volumes:
      - ./app:/app           
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy  
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app